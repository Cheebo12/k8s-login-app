version: "3.9"

services:
  app:
    build: .
    container_name: loginapp
    ports:
      - "3000:3000"
    environment:
      MONGO_URL: "mongodb://admin:admin123@mongo:27017/simple-login-app?authSource=admin"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - "27017:27017"
